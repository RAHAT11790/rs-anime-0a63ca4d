<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RS ANIME Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
.player-container { position: relative; width: 100%; height: 100vh; background: #000; }
video { width: 100%; height: 100%; object-fit: contain; }
.controls-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 25%, transparent 60%, rgba(0,0,0,0.7) 85%); opacity: 1; transition: opacity 0.2s ease; z-index: 10; pointer-events: auto; }
.controls-overlay.hidden { opacity: 0; pointer-events: none; }
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
.top-bar .title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin-right: 12px; }
.top-bar .close-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
.center-controls { display: flex; align-items: center; justify-content: center; gap: 32px; }
.center-controls button { border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.skip-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); }
.play-btn { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #00d4aa, #0ea5e9); box-shadow: 0 0 20px rgba(0,212,170,0.4); }
.play-btn svg, .skip-btn svg { width: 24px; height: 24px; }
.bottom-controls { padding: 0 16px 16px; }
.progress-wrapper { width: 100%; height: 24px; display: flex; align-items: center; cursor: pointer; margin-bottom: 8px; touch-action: none; }
.progress-track { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; position: relative; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #00d4aa, #0ea5e9); border-radius: 4px; position: relative; width: 0%; transition: width 0.1s linear; }
.progress-thumb { position: absolute; right: -8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background: #00d4aa; box-shadow: 0 0 8px rgba(0,212,170,0.6); }
.bottom-row { display: flex; align-items: center; justify-content: space-between; }
.time-display { font-size: 11px; font-weight: 500; font-variant-numeric: tabular-nums; }
.right-controls { display: flex; align-items: center; gap: 8px; }
.ctrl-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.12); backdrop-filter: blur(6px); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.ctrl-btn svg { width: 16px; height: 16px; }
.speed-badge { font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 4px; cursor: pointer; border: none; color: #fff; }
.skip-indicator { position: absolute; top: 50%; transform: translateY(-50%); width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; animation: fadeOut 0.5s forwards; backdrop-filter: blur(4px); pointer-events: none; z-index: 20; }
.skip-indicator.left { left: 15%; }
.skip-indicator.right { right: 15%; }
.skip-indicator .label { font-size: 10px; margin-top: 2px; }
@keyframes fadeOut { 0% { opacity: 1; transform: translateY(-50%) scale(1); } 100% { opacity: 0; transform: translateY(-50%) scale(1.3); } }
.swipe-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 20; display: flex; align-items: center; gap: 8px; }
.loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 15; }
.spinner { width: 48px; height: 48px; border: 3px solid transparent; border-top-color: #00d4aa; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.settings-panel { position: absolute; bottom: 70px; right: 12px; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-radius: 12px; padding: 12px; min-width: 160px; z-index: 30; border: 1px solid rgba(255,255,255,0.1); }
.settings-panel button { display: block; width: 100%; text-align: left; padding: 8px 12px; border: none; background: transparent; color: #fff; font-size: 12px; cursor: pointer; border-radius: 8px; }
.settings-panel button:hover { background: rgba(255,255,255,0.1); }
.settings-panel button.active { background: linear-gradient(135deg, #00d4aa, #0ea5e9); font-weight: 700; }
.lock-overlay { position: absolute; inset: 0; z-index: 25; }
.lock-btn-corner { position: absolute; top: 12px; right: 12px; z-index: 26; }
.crop-badge { font-size: 10px; background: rgba(255,255,255,0.15); padding: 3px 10px; border-radius: 12px; border: none; color: #fff; cursor: pointer; backdrop-filter: blur(4px); }
</style>
</head>
<body>

<div class="player-container" id="playerContainer">
  <video id="video" playsinline preload="auto"></video>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Skip indicators -->
  <div id="skipIndicator" style="display:none;"></div>

  <!-- Swipe display -->
  <div class="swipe-display" id="swipeDisplay" style="display:none;"></div>

  <!-- Lock overlay -->
  <div class="lock-overlay" id="lockOverlay" style="display:none;" onclick="resetHideTimer()"></div>
  <div class="lock-btn-corner" id="lockBtnCorner" style="display:none;">
    <button class="ctrl-btn" onclick="toggleLock()" style="width:40px;height:40px;">🔓</button>
  </div>

  <!-- Controls -->
  <div class="controls-overlay" id="controls" onclick="handleAreaClick(event)">
    <!-- Top -->
    <div class="top-bar" onclick="event.stopPropagation()">
      <div class="title" id="titleDisplay">RS ANIME Player</div>
      <button class="crop-badge" id="cropBtn" onclick="cycleCrop()">Fit</button>
      <button class="ctrl-btn" onclick="toggleLock()" style="margin-left:8px;">🔒</button>
    </div>

    <!-- Center -->
    <div class="center-controls" onclick="event.stopPropagation()">
      <button class="skip-btn" onclick="seekBy(-10)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
      </button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="skip-btn" onclick="seekBy(10)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
      </button>
    </div>

    <!-- Bottom -->
    <div class="bottom-controls" onclick="event.stopPropagation()">
      <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill">
            <div class="progress-thumb"></div>
          </div>
        </div>
      </div>
      <div class="bottom-row">
        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
        <div class="right-controls">
          <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
          <button class="speed-badge" id="speedBadge" onclick="cycleSpeed()">1x</button>
          <button class="ctrl-btn" onclick="toggleSettings()">⚙</button>
          <button class="ctrl-btn" id="fsBtn" onclick="toggleFullscreen()">⛶</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel" style="display:none;" onclick="event.stopPropagation()">
    <p style="font-size:10px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Speed</p>
    <button onclick="setSpeed(0.5)">0.5x</button>
    <button onclick="setSpeed(0.75)">0.75x</button>
    <button onclick="setSpeed(1)" class="active">1x (Normal)</button>
    <button onclick="setSpeed(1.25)">1.25x</button>
    <button onclick="setSpeed(1.5)">1.5x</button>
    <button onclick="setSpeed(2)">2x</button>
  </div>
</div>

<script>
const video = document.getElementById('video');
const controls = document.getElementById('controls');
const progressFill = document.getElementById('progressFill');
const timeDisplay = document.getElementById('timeDisplay');
const loadingOverlay = document.getElementById('loadingOverlay');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const settingsPanel = document.getElementById('settingsPanel');
const speedBadge = document.getElementById('speedBadge');
const muteBtn = document.getElementById('muteBtn');
const titleDisplay = document.getElementById('titleDisplay');
const progressWrapper = document.getElementById('progressWrapper');
const playerContainer = document.getElementById('playerContainer');
const lockOverlay = document.getElementById('lockOverlay');
const lockBtnCorner = document.getElementById('lockBtnCorner');
const cropBtn = document.getElementById('cropBtn');

// Config — set video URL via query param: ?src=URL&title=TITLE
const params = new URLSearchParams(location.search);
const videoSrc = params.get('src') || '';
const videoTitle = params.get('title') || 'RS ANIME Player';
titleDisplay.textContent = videoTitle;
if (videoSrc) { video.src = videoSrc; }

let hideTimer = null;
let isLocked = false;
let brightness = 1;
let cropModes = ['contain', 'cover', 'fill'];
let cropLabels = ['Fit', 'Crop', 'Stretch'];
let cropIdx = 0;
let lastTapTime = 0;
let lastTapX = 0;
let swipeState = null;

// Autoplay
video.addEventListener('loadedmetadata', () => {
  loadingOverlay.style.display = 'none';
  video.play().catch(() => {
    video.muted = true;
    video.play().then(() => {
      const unmute = () => { video.muted = false; document.removeEventListener('touchstart', unmute); document.removeEventListener('click', unmute); };
      document.addEventListener('touchstart', unmute, { once: true });
      document.addEventListener('click', unmute, { once: true });
    }).catch(() => {});
  });
});
video.addEventListener('canplay', () => {
  loadingOverlay.style.display = 'none';
  if (video.paused) {
    video.play().catch(() => { video.muted = true; video.play().catch(() => {}); });
  }
});
video.addEventListener('waiting', () => { loadingOverlay.style.display = 'flex'; });
video.addEventListener('playing', () => { loadingOverlay.style.display = 'none'; });
video.addEventListener('play', () => {
  playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/>';
  startProgressUpdate();
});
video.addEventListener('pause', () => {
  playIcon.innerHTML = '<polygon points="5,3 19,12 5,21" fill="currentColor"/>';
  stopProgressUpdate();
});

// Progress update via RAF
let rafId = 0;
function startProgressUpdate() {
  const tick = () => {
    if (!video.paused && !video.ended) {
      const pct = video.duration > 0 ? (video.currentTime / video.duration) * 100 : 0;
      progressFill.style.width = pct + '%';
      timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
      rafId = requestAnimationFrame(tick);
    }
  };
  rafId = requestAnimationFrame(tick);
}
function stopProgressUpdate() { cancelAnimationFrame(rafId); }

function formatTime(t) {
  if (!t || !isFinite(t)) return '0:00';
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  return m + ':' + s.toString().padStart(2, '0');
}

// Controls auto-hide
function resetHideTimer() {
  controls.classList.remove('hidden');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => { if (!video.paused) controls.classList.add('hidden'); }, 3000);
}
resetHideTimer();

// Toggle play
function togglePlay() { if (video.paused) video.play(); else video.pause(); resetHideTimer(); }

// Seek
function seekBy(sec) {
  if (!isFinite(video.duration)) return;
  video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + sec));
  showSkipIndicator(sec > 0 ? 'right' : 'left', Math.abs(sec) + 's');
  resetHideTimer();
}

function showSkipIndicator(side, text) {
  const el = document.getElementById('skipIndicator');
  el.className = 'skip-indicator ' + side;
  el.innerHTML = (side === 'left' ? '⏪' : '⏩') + '<span class="label">' + text + '</span>';
  el.style.display = 'flex';
  setTimeout(() => { el.style.display = 'none'; }, 500);
}

// Double tap
function handleAreaClick(e) {
  if (isLocked) return;
  const now = Date.now();
  const rect = e.currentTarget.getBoundingClientRect();
  const x = (e.clientX || (e.touches && e.touches[0].clientX) || 0);
  const relX = (x - rect.left) / rect.width;

  if (now - lastTapTime < 300) {
    if (relX < 0.33) seekBy(-10);
    else if (relX > 0.66) seekBy(10);
    else togglePlay();
    lastTapTime = 0;
  } else {
    lastTapTime = now;
    setTimeout(() => { if (lastTapTime === now) { controls.classList.toggle('hidden'); resetHideTimer(); } }, 300);
  }
}

// Progress bar click/touch
progressWrapper.addEventListener('click', (e) => {
  e.stopPropagation();
  const rect = progressWrapper.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (isFinite(video.duration)) video.currentTime = pct * video.duration;
  resetHideTimer();
});
progressWrapper.addEventListener('touchstart', (e) => { e.stopPropagation(); seekToTouch(e); }, { passive: true });
progressWrapper.addEventListener('touchmove', (e) => { e.stopPropagation(); seekToTouch(e); }, { passive: true });
function seekToTouch(e) {
  const rect = progressWrapper.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
  if (isFinite(video.duration)) {
    video.currentTime = pct * video.duration;
    progressFill.style.width = (pct * 100) + '%';
    timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
  }
  resetHideTimer();
}

// Volume swipe (right side) / Brightness swipe (left side)
playerContainer.addEventListener('touchstart', (e) => {
  if (isLocked || e.target.closest('.bottom-controls') || e.target.closest('.top-bar') || e.target.closest('.center-controls')) return;
  swipeState = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, type: null };
});
playerContainer.addEventListener('touchmove', (e) => {
  if (!swipeState || isLocked) return;
  const dy = e.touches[0].clientY - swipeState.startY;
  if (!swipeState.type && Math.abs(dy) > 20) {
    const rect = playerContainer.getBoundingClientRect();
    const relX = (swipeState.startX - rect.left) / rect.width;
    swipeState.type = relX > 0.5 ? 'volume' : 'brightness';
  }
  const display = document.getElementById('swipeDisplay');
  if (swipeState.type === 'volume') {
    const newVol = Math.max(0, Math.min(1, video.volume - dy * 0.005));
    video.volume = newVol;
    display.innerHTML = '🔊 ' + Math.round(newVol * 100) + '%';
    display.style.display = 'flex';
    swipeState.startY = e.touches[0].clientY;
  } else if (swipeState.type === 'brightness') {
    brightness = Math.max(0.3, Math.min(1.5, brightness - dy * 0.003));
    video.style.filter = 'brightness(' + brightness + ')';
    display.innerHTML = '☀ ' + Math.round(brightness * 100) + '%';
    display.style.display = 'flex';
    swipeState.startY = e.touches[0].clientY;
  }
});
playerContainer.addEventListener('touchend', () => {
  swipeState = null;
  document.getElementById('swipeDisplay').style.display = 'none';
});

// Mute
function toggleMute() {
  video.muted = !video.muted;
  muteBtn.textContent = video.muted ? '🔇' : '🔊';
}

// Speed
const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIdx = 2;
function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  setSpeed(speeds[speedIdx]);
}
function setSpeed(rate) {
  video.playbackRate = rate;
  speedBadge.textContent = rate + 'x';
  speedIdx = speeds.indexOf(rate);
  // Update active in settings
  settingsPanel.querySelectorAll('button').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.startsWith(rate + 'x'));
  });
  settingsPanel.style.display = 'none';
}

// Settings
function toggleSettings() { settingsPanel.style.display = settingsPanel.style.display === 'none' ? 'block' : 'none'; }

// Fullscreen
function toggleFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
    try { screen.orientation.unlock(); } catch {}
  } else {
    playerContainer.requestFullscreen().then(() => {
      try { screen.orientation.lock('landscape'); } catch {}
    }).catch(() => {});
  }
}

// Lock
function toggleLock() {
  isLocked = !isLocked;
  if (isLocked) {
    controls.classList.add('hidden');
    lockOverlay.style.display = 'block';
    lockBtnCorner.style.display = 'block';
  } else {
    lockOverlay.style.display = 'none';
    lockBtnCorner.style.display = 'none';
    resetHideTimer();
  }
}

// Crop
function cycleCrop() {
  cropIdx = (cropIdx + 1) % cropModes.length;
  video.style.objectFit = cropModes[cropIdx];
  cropBtn.textContent = cropLabels[cropIdx];
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'ArrowLeft': seekBy(-10); break;
    case 'ArrowRight': seekBy(10); break;
    case 'ArrowUp': e.preventDefault(); video.volume = Math.min(1, video.volume + 0.1); break;
    case 'ArrowDown': e.preventDefault(); video.volume = Math.max(0, video.volume - 0.1); break;
    case 'f': toggleFullscreen(); break;
    case 'm': toggleMute(); break;
  }
});
</script>
</body>
</html>
